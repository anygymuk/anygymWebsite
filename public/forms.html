<!DOCTYPE html>
<html>
<head><title>Forms</title></head>
<body>
  <!-- Hidden forms for Netlify form detection at build time -->
  <form name="newsletter" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="email" />
    <input type="text" name="consent" />
    <input type="text" name="bot-field" />
  </form>
  <form name="gym-group" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="contactName" />
    <input type="text" name="email" />
    <input type="text" name="companyName" />
    <input type="text" name="locations" />
    <input type="text" name="phone" />
    <textarea name="message"></textarea>
    <input type="text" name="bot-field" />
  </form>
  <form name="investor" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="fullName" />
    <input type="text" name="email" />
    <input type="text" name="company" />
    <input type="text" name="investmentRange" />
    <textarea name="message"></textarea>
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
